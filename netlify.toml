[build]
  command = "npm run build"
  publish = "dist"

[[edge_functions]]
  path = "/ytapi/*"
  function = "api-proxy"

[[edge_functions]]
  path = "/lrclib/*"
  function = "api-proxy"

[[edge_functions]]
  path = "/yt-proxy/*"
  function = "api-proxy"

[[edge_functions]]
  path = "/audiostream"
  function = "api-proxy"

[[edge_functions]]
  path = "/dl-proxy"
  function = "api-proxy"
